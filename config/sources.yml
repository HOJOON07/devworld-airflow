    source_type: rss
    base_url: https://d2.naver.com
    feed_url: https://d2.naver.com/d2/rss
    is_active: false  # RSS 404 — URL 확인 후 활성화

  # 카카오
  - name: kakao-tech
    source_type: rss
    base_url: https://tech.kakao.com
    feed_url: https://tech.kakao.com/feed
    is_active: true

  # 라인 (403 차단 — Playwright 필요)
  - name: line-engineering
    source_type: rss
    base_url: https://techblog.lycorp.co.jp/ko
