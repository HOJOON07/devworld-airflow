  # 당근 (Medium — RSS 본문 포함)
  - name: daangn-tech
    source_type: rss
    base_url: https://medium.com/daangn
    feed_url: https://medium.com/feed/daangn
    is_active: true

  # 토스
  - name: toss-tech
    source_type: rss
    base_url: https://toss.tech
    feed_url: https://toss.tech/rss.xml
    is_active: true
