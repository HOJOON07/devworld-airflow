devworld:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', 'devworld.duckdb') }}"
      threads: 4
    prod:
      type: postgres
      host: "{{ env_var('DB_HOST', 'localhost') }}"
      port: "{{ env_var('DB_PORT', '5432') | int }}"
      user: "{{ env_var('DB_USER', 'devworld') }}"
      pass: "{{ env_var('DB_PASSWORD', 'devworld') }}"
      dbname: "{{ env_var('DB_NAME', 'devworld') }}"
      schema: public
      threads: 4
