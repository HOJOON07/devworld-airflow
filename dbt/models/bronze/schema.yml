version: 2

sources:
  - name: public
    description: PostgreSQL app_db tables
    tables:
      - name: articles
        description: Crawled articles from all sources
      - name: crawl_sources
        description: Crawl source registry
      - name: article_enrichments
        description: AI enrichment results (keywords, topics, summary)

models:
  - name: stg_articles
    description: Staged articles with source name joined
    columns:
      - name: id
        description: Article UUID
        tests:
          - unique
          - not_null
      - name: url
        description: Article URL
        tests:
          - not_null
      - name: source_id
        description: Reference to crawl source
        tests:
          - not_null
      - name: source_name
        description: Crawl source name
