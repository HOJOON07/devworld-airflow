version: 2

sources:
  - name: bronze_raw
    database: devworld_lake
    schema: bronze
    description: DuckLake Bronze tables loaded by dlt
    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 48, period: hour}
    tables:
      - name: articles
        description: Bronze articles loaded by dlt into DuckLake
        loaded_at_field: crawled_at

  - name: app_db
    database: app_db
    schema: public
    description: PostgreSQL app_db operational tables
    tables:
      - name: crawl_sources
        description: Crawl source registry
      - name: article_enrichments
        description: AI enrichment results (keywords, topics, summary)
      - name: github_repos
        description: Tracked GitHub repositories
      - name: github_prs
        description: GitHub Pull Requests
      - name: github_pr_files
        description: GitHub PR file changes
      - name: github_issues
        description: GitHub Issues
      - name: github_pr_ai_summaries
        description: AI-generated PR summaries
      - name: github_issue_ai_summaries
        description: AI-generated Issue summaries

models:
  - name: stg_articles
    description: Staged articles with source name joined
    columns:
      - name: id
        description: Article UUID (중복 가능 — Bronze는 append-only, dedup은 Silver)
        tests:
          - not_null
      - name: url
        description: Article URL
        tests:
          - not_null
      - name: source_id
        description: Reference to crawl source
        tests:
          - not_null
      - name: source_name
        description: Crawl source name
