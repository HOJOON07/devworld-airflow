version: 2

models:
  - name: mart_articles
    description: Article mart for product serving (Gold layer)
    columns:
      - name: article_id
        description: Article UUID
        tests:
          - unique
          - not_null
      - name: title
        description: Article title
        tests:
          - not_null
      - name: url
        description: Article URL
        tests:
          - unique
          - not_null
      - name: source_name
        description: Crawl source name

  - name: mart_trending_topics
    description: Trending topics by period (daily, weekly, monthly)
    columns:
      - name: period
        description: "daily, weekly, or monthly"
        tests:
          - not_null
      - name: topic
        description: Topic category
        tests:
          - not_null
      - name: article_count
        description: Number of articles with this topic

  - name: mart_keyword_stats
    description: Keyword frequency statistics
    columns:
      - name: keyword
        description: Technical keyword (lowercase)
        tests:
          - unique
          - not_null
      - name: article_count
        description: Number of articles with this keyword

  - name: mart_source_stats
    description: Source (company) statistics
    columns:
      - name: source_name
        description: Crawl source name
        tests:
          - unique
          - not_null
      - name: article_count
        description: Total articles from this source
